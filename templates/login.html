<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ม.4/2</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100vh; display: flex; align-items: center; }
        .login-card { background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); padding: 40px; width: 100%; max-width: 400px; }
        .btn-primary { background: #764ba2; border: none; border-radius: 10px; padding: 12px; }
        .btn-primary:hover { background: #5a397a; }
        .form-control { border-radius: 10px; padding: 12px; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center">
        <div class="login-card text-center">
            <h2 class="mb-4 fw-bold text-dark">ม.4/2 💰</h2>
            <p class="text-muted mb-4">เข้าสู่ระบบเพื่อจัดการเงินห้อง</p>
            <form method="POST" action="/login">
                <input type="text" name="username" class="form-control mb-3" placeholder="ชื่อผู้ใช้ (user1, admin)" required>
                <input type="password" name="password" class="form-control mb-3" placeholder="รหัสผ่าน" required>
                <button type="submit" class="btn btn-primary w-100 fw-bold">เข้าสู่ระบบ</button>
            </form>
            <div class="mt-4 small text-muted">รหัสเริ่มต้นคือ 1234</div>
        </div>
    </div>
</body>
</html>

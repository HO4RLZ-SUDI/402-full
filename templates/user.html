<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account - ม.4/2</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body { background-color: #f8f9fa; }
        .user-header { background: #764ba2; color: white; padding: 40px 0; border-radius: 0 0 30px 30px; margin-bottom: 30px; }
        .main-card { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); padding: 30px; border: none; }
        .qr-box { background: #fff; border: 2px dashed #764ba2; border-radius: 20px; padding: 20px; margin: 20px 0; }
        .btn-main { border-radius: 12px; padding: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="user-header text-center">
        <h3>สวัสดี, {{ s[2] }}</h3>
        <p class="mb-0 text-white-50">ยินดีต้อนรับสู่ระบบจัดการเงินห้อง</p>
    </div>

    <div class="container">
        <div class="main-card text-center mb-4">
            <h6 class="text-muted">ยอดที่ต้องชำระขณะนี้</h6>
            <h1 class="display-4 fw-bold text-danger">{{ s[4] }} <small class="h4">บาท</small></h1>
            
            {% if s[4] > 0 %}
            <button class="btn btn-primary btn-main w-100 mt-3" onclick="openQR({{ s[4] }}, {{ s[0] }})">📱 ชำระเงินผ่าน QR</button>
            {% else %}
            <div class="alert alert-success mt-3">✅ คุณจ่ายครบแล้ว เยี่ยมมาก!</div>
            {% endif %}
        </div>

        <div class="main-card mb-4">
            <h5 class="fw-bold mb-3">🛡️ เปลี่ยนรหัสผ่าน</h5>
            <form action="/change_password" method="POST">
                <input type="password" name="new_password" class="form-control mb-3" placeholder="รหัสผ่านใหม่" required>
                <button type="submit" class="btn btn-warning w-100 fw-bold">อัปเดตรหัสผ่าน</button>
            </form>
        </div>
        
        <div class="text-center">
            <a href="/logout" class="text-danger text-decoration-none">ออกจากระบบ</a>
        </div>
    </div>

    <div class="modal fade" id="qrModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow" style="border-radius: 25px;">
                <div class="modal-body text-center p-4">
                    <h5 class="fw-bold">สแกนเพื่อจ่าย {{ s[4] }} บาท</h5>
                    <div class="qr-box">
                        <img id="m-qr" src="" class="img-fluid" style="max-width: 220px;">
                    </div>
                    <p class="small text-muted">โอนเสร็จแล้ว อัปโหลดสลิปที่นี่</p>
                    <input type="file" id="slipInput" class="form-control mb-2">
                    <button class="btn btn-light w-100" data-bs-dismiss="modal">ปิดหน้าต่าง</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const modal = new bootstrap.Modal(document.getElementById('qrModal'));
        function openQR(amount, id) {
            fetch(`/get_qr/${amount}`)
                .then(r => r.json())
                .then(data => {
                    document.getElementById('m-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${data.payload}`;
                    modal.show();
                });
        }
        
        document.getElementById('slipInput').onchange = function() {
            let formData = new FormData();
            formData.append('slip', this.files[0]);
            alert("กำลังตรวจสอบสลิปด้วย AI...");
            fetch(`/verify_slip/{{ s[0] }}`, { method: 'POST', body: formData })
                .then(r => r.json())
                .then(data => {
                    alert(data.message);
                    if(data.status === 'success') location.reload();
                });
        };
    </script>
</body>
</html>
